<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">Legal retrieval pipeline schematic</title>
  <desc id="desc">Documents pass through OCR and embeddings into a cited answer.</desc>
