<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title desc" shape-rendering="geometricPrecision">
  <title id="title">Video to VR reconstruction schematic</title>
  <desc id="desc">Video frames flow into a wireframe point-cloud scene and a VR headset.</desc>
